# USParts reverse proxy — Apache on port 80 → app on 127.0.0.1:3000
<VirtualHost *:80>
    ServerName 192.168.1.153

    ProxyRequests Off
    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/

    ErrorLog ${APACHE_LOG_DIR}/usparts-error.log
    CustomLog ${APACHE_LOG_DIR}/usparts-access.log combined
</VirtualHost>
