# Development database (runs on 192.168.1.153 or locally)
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: usparts
      POSTGRES_USER: usparts
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-usparts}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U usparts -d usparts"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
